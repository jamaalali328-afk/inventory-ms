<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Inventory MS</title>
<link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<!-- ===================== LOGIN SCREEN ===================== -->
<div id="login-screen">
  <div class="login-card">
    <h1>Inventory MS</h1>
    <p class="sub">Sign in to manage your store</p>
    <form id="login-form">
      <div class="field">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@store.com" required />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn btn-primary btn-block">Log In</button>
      <div id="login-error" class="error-text hidden"></div>
    </form>
    <div style="text-align:right; margin-top:10px;">
      <button class="link-btn" id="forgot-password-link">Forgot password?</button>
    </div>
    <div class="login-hint">
      Default admin account:<br />
      admin@store.com / admin123
    </div>
  </div>
</div>

<!-- ===================== APP SCREEN ===================== -->
<div id="app-screen" class="hidden">
  <header class="topbar">
    <button class="icon-btn" id="hamburger-btn">☰</button>
    <div class="app-name">Inventory MS</div>
    <button class="icon-btn" id="theme-toggle-btn">🌙</button>
  </header>

  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <nav class="sidebar-nav" id="sidebar-nav">
        <div class="nav-item" data-page="dashboard"><span class="nav-icon">📊</span> Dashboard</div>
        <div class="nav-item" data-page="products"><span class="nav-icon">📦</span> Products</div>
        <div class="nav-item" data-page="stockin"><span class="nav-icon">⬇️</span> Stock In</div>
        <div class="nav-item" data-page="stockout"><span class="nav-icon">⬆️</span> Stock Out</div>
        <div class="nav-item" data-page="sales"><span class="nav-icon">🛒</span> Sales</div>
        <div class="nav-item" data-page="customers"><span class="nav-icon">👥</span> Customers</div>
        <div class="nav-item" data-page="analytics"><span class="nav-icon">📈</span> Analytics</div>
        <div class="nav-item" data-page="reports"><span class="nav-icon">📄</span> Reports</div>
        <div class="nav-item" data-page="lookup"><span class="nav-icon">🔍</span> Item Lookup</div>
        <div class="nav-item" data-page="branches"><span class="nav-icon">🏢</span> Branches</div>
        <div class="nav-item" data-page="settings"><span class="nav-icon">⚙️</span> Settings</div>
      </nav>
      <div class="sidebar-footer">
        <div class="user-chip">
          <div class="user-avatar" id="user-avatar">A</div>
          <div>
            <div class="user-name" id="user-name">Admin</div>
            <div class="user-role" id="user-role">admin</div>
          </div>
        </div>
        <button class="logout-btn" id="logout-btn">Logout</button>
      </div>
    </aside>

    <main id="content"></main>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
